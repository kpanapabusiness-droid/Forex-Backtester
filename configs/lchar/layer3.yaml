# L3 — Layer 3 Cross-Pair Atlas configuration
#
# Locked at L0 (docs/L0_METHODOLOGY_LOCK.md). Computational specs in this file
# match the L3 phase prompt; do not modify without an explicit re-planning phase.
#
# Output is descriptive, not predictive (L0 §3). The atlas reports; it does not
# recommend.

arc: L
phase: L3
description: "Layer 3 — cross-pair structure across the 28-pair NNFX universe."

# ----------------------------------------------------------------------
# Data inputs (same conventions as L1 / L2)
# ----------------------------------------------------------------------
data:
  data_dirs:
    "1H": "data/1hr"
    "4H": "data/4hr"
    "D1": "data/daily"
  date_start: "2020-10-01"
  date_end: null
  pairs:
    - AUD_CAD
    - AUD_CHF
    - AUD_JPY
    - AUD_NZD
    - AUD_USD
    - CAD_CHF
    - CAD_JPY
    - CHF_JPY
    - EUR_AUD
    - EUR_CAD
    - EUR_CHF
    - EUR_GBP
    - EUR_JPY
    - EUR_NZD
    - EUR_USD
    - GBP_AUD
    - GBP_CAD
    - GBP_CHF
    - GBP_JPY
    - GBP_NZD
    - GBP_USD
    - NZD_CAD
    - NZD_CHF
    - NZD_JPY
    - NZD_USD
    - USD_CAD
    - USD_CHF
    - USD_JPY
  timeframes: ["1H", "4H", "D1"]

# 8 currencies whose pairwise basket is the 28-pair NNFX universe.
currencies: ["AUD", "CAD", "CHF", "EUR", "GBP", "JPY", "NZD", "USD"]

# ----------------------------------------------------------------------
# L3 stat specs (locked)
# ----------------------------------------------------------------------
stats:
  # Rolling correlation matrix
  rolling_window: 60
  rolling_step: 1
  # Percentiles reported for rolling off-diag mean and matrix-stab Frobenius diff
  rolling_corr_percentiles: [25, 50, 75, 95]
  matrix_stab_percentiles: [25, 50, 75, 95]
  # Currency strength
  ccy_persistence_lags: [1, 5, 20]
  ccy_top_threshold: 3        # rank ≤ 3 = top
  ccy_bottom_threshold: 6     # rank ≥ 6 = bottom
  ccy_reversal_window: 5      # bars
  # Pair-pair lead-lag
  pairpair_lead_lag_lags: [-2, -1, 1, 2]    # P1_t vs P2_{t+lag}
  pairpair_corr_filter_abs: 0.5             # |full-sample corr| > 0.5 to enter
  # Risk basket rolling-corr percentiles
  risk_basket_percentiles: [10, 25, 50, 75, 90]

# Risk-on / risk-off basket definitions (per spec).
risk_baskets:
  risk_on: ["AUD_USD", "NZD_USD"]
  risk_off: ["USD_JPY", "USD_CHF"]

# ----------------------------------------------------------------------
# Bootstrap (locked, same scheme as L1 / L2)
# ----------------------------------------------------------------------
bootstrap:
  n_resamples: 1000
  seed: 42
  ci_level: 0.95
  method: "percentile"
  scheme: "iid"

# ----------------------------------------------------------------------
# Output
# ----------------------------------------------------------------------
output:
  csv_path: "results/lchar/atlas/layer3_crosspair.csv"
  float_format: "%.10g"
  sort_columns: ["pair", "timeframe", "stat_family", "stat_name"]
