# L4 — Layer 4 Conditional Atlas configuration
#
# Locked at L0 (docs/L0_METHODOLOGY_LOCK.md §4 metric, §5 N-floor and N-cap).
# 192 trials (under the 300-trial L0 family budget). Do not modify thresholds,
# horizons, or family budgets without an explicit re-planning phase.
#
# Output is descriptive, not predictive (L0 §3). The atlas reports trial
# metrics; L5 ranks. L4 does NOT identify "passing" trials.

arc: L
phase: L4
description: "Layer 4 — conditional return distributions per (condition × direction × horizon × signal_TF) trial, with DSR selection-bias correction."

# ----------------------------------------------------------------------
# Data inputs (same as L1 / L2 / L3)
# ----------------------------------------------------------------------
data:
  data_dirs:
    "1H": "data/1hr"
    "4H": "data/4hr"
    "D1": "data/daily"
  date_start: "2020-10-01"
  date_end: null
  pairs:
    - AUD_CAD
    - AUD_CHF
    - AUD_JPY
    - AUD_NZD
    - AUD_USD
    - CAD_CHF
    - CAD_JPY
    - CHF_JPY
    - EUR_AUD
    - EUR_CAD
    - EUR_CHF
    - EUR_GBP
    - EUR_JPY
    - EUR_NZD
    - EUR_USD
    - GBP_AUD
    - GBP_CAD
    - GBP_CHF
    - GBP_JPY
    - GBP_NZD
    - GBP_USD
    - NZD_CAD
    - NZD_CHF
    - NZD_JPY
    - NZD_USD
    - USD_CAD
    - USD_CHF
    - USD_JPY
  timeframes: ["1H", "4H", "D1"]

currencies: ["AUD", "CAD", "CHF", "EUR", "GBP", "JPY", "NZD", "USD"]

# ----------------------------------------------------------------------
# Indicator parameters (matches L1–L3)
# ----------------------------------------------------------------------
indicators:
  atr_period: 14
  kijun_period: 26
  sma_period: 20

# ----------------------------------------------------------------------
# L0-locked DSR parameters
# ----------------------------------------------------------------------
dsr:
  family_size: 300            # L0 §4 family budget (selection-bias correction N_trials)
  min_n_floor: 100            # L0 §4 minimum pooled observations for L5 ranking
  threshold_proceed: 0.95     # L0 §5 threshold for L5; L4 records but does NOT apply

# ----------------------------------------------------------------------
# Horizons per signal_TF (L0 §4)
# ----------------------------------------------------------------------
horizons:
  "1H": [1, 24, 120]
  "4H": [1, 6, 30]
  "D1": [1, 5, 20]

# ----------------------------------------------------------------------
# Threshold window (L4 phase prompt — trailing 100-bar percentile)
# ----------------------------------------------------------------------
threshold:
  trailing_window: 100
  top_decile_quantile: 0.90
  bottom_decile_quantile: 0.10

# ----------------------------------------------------------------------
# Trial families (192 trials total; under 300 cap)
# ----------------------------------------------------------------------
trials:
  univariate_extreme:
    base_conditions:
      - bar_range_top_decile
      - dist_kijun_top_decile_mag
      - dist_sma_top_decile_mag
      - abs_return_top_decile
    directions: ["pos", "neg"]
    timeframes: ["1H", "4H", "D1"]
    # 4 × 2 × 3 × 3 horizons = 72

  volatility_regime:
    base_conditions:
      - d1_atr_top_decile
      - d1_atr_bottom_decile
    timeframes: ["1H", "4H", "D1"]
    # 2 × 3 × 3 = 18

  mtf_alignment:
    states: ["3_up", "3_down", "2_up_mixed", "2_down_mixed", "opposed"]
    trends: ["kijun", "sma"]
    timeframes: ["1H"]
    # 5 × 2 × 1 × 3 = 30

  cross_pair:
    base_conditions:
      - risk_basket_corr_top_decile_mag
      - risk_basket_corr_bottom_decile_mag
      - matrix_frobenius_shift_top_decile
      - usd_strength_extreme
    timeframes: ["1H", "4H", "D1"]
    # 4 × 3 × 3 = 36

  dow:
    base_conditions:
      - dow_top_mean_abs_return_day
      - dow_bottom_mean_abs_return_day
    timeframes: ["1H", "4H", "D1"]
    # 2 × 3 × 3 = 18

  run_length:
    base_conditions:
      - up_run_5plus
      - down_run_5plus
    run_length_min: 5
    timeframes: ["1H", "4H", "D1"]
    # 2 × 3 × 3 = 18

# Risk-on / risk-off basket (matches L3)
risk_baskets:
  risk_on: ["AUD_USD", "NZD_USD"]
  risk_off: ["USD_JPY", "USD_CHF"]

# Universe-rolling-correlation window for matrix Frobenius diff and basket
# correlation (matches L3)
universe_rolling_window: 60

# ----------------------------------------------------------------------
# Diagnostics (per-pair Sharpe; descriptive only, not used in ranking)
# ----------------------------------------------------------------------
diagnostics:
  per_pair_sharpe_min_n: 5    # below this, no diag row is emitted

# ----------------------------------------------------------------------
# Bootstrap (locked, same scheme as L1 / L2 / L3)
# ----------------------------------------------------------------------
bootstrap:
  n_resamples: 1000
  seed: 42
  ci_level: 0.95
  method: "percentile"
  scheme: "iid"

# ----------------------------------------------------------------------
# Output
# ----------------------------------------------------------------------
output:
  csv_path: "results/lchar/atlas/layer4_conditional.csv"
  float_format: "%.10g"
  sort_columns: ["pair", "timeframe", "stat_family", "stat_name"]
