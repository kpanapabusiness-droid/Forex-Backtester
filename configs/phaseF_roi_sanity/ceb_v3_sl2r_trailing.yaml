# Phase F ROI sanity: CEB v3 only, SL=2R (3×ATR14), two runners + trailing, spreads ON.
# No engine changes; config-driven only.
# Output: results/phaseF_roi_sanity/ceb_v3_sl2r_trailing/

strategy_version: "forex_backtester_v1.9.7"

timeframe: "D"
date_range:
  start: "2019-01-01"
  end: "2026-01-01"

pairs:
  - "EUR_USD"
  - "GBP_USD"
  - "USD_JPY"
  - "USD_CHF"
  - "USD_CAD"
  - "AUD_USD"
  - "NZD_USD"
  - "EUR_GBP"
  - "EUR_JPY"
  - "EUR_CHF"
  - "EUR_CAD"
  - "EUR_AUD"
  - "EUR_NZD"
  - "GBP_JPY"
  - "GBP_CHF"
  - "GBP_CAD"
  - "GBP_AUD"
  - "GBP_NZD"
  - "CHF_JPY"
  - "CAD_JPY"
  - "AUD_JPY"
  - "NZD_JPY"
  - "CAD_CHF"
  - "AUD_CHF"
  - "AUD_CAD"
  - "AUD_NZD"
  - "NZD_CHF"
  - "NZD_CAD"

spreads:
  enabled: true
  default_pips: 0.5
  per_pair: {}
  mode: "fixed"
  atr_mult: 0.0

indicators:
  c1: "c1_compression_escape_ratio_state_machine"
  use_c2: false
  use_baseline: false
  use_volume: false
  use_exit: false
  c2: null
  baseline: null
  volume: null
  exit: null

indicator_params:
  c1_compression_escape_ratio_state_machine:
    L_slow: 50
    r_atr: 0.85
    r_rng: 0.85
    r_box: 1.1
    M_enter: 4
    M_exit: 3
    K_max: 40
    cooldown_bars: 10

rules:
  one_candle_rule: false
  pullback_rule: false
  bridge_too_far_days: 7
  allow_baseline_as_catalyst: false

entry:
  sl_atr: 3.0
  tp1_atr: 1.0
  trail_after_atr: 2.0
  ts_atr: 1.5

execution:
  intrabar_priority: "tp_first"

engine:
  allow_continuation: true
  duplicate_open_policy: "block"

exit:
  use_trailing_stop: true
  move_to_breakeven_after_atr: true
  exit_on_c1_reversal: true
  exit_on_baseline_cross: false
  exit_on_exit_signal: false

risk:
  starting_balance: 10000.0
  risk_per_trade_pct: 2.0
  risk_per_trade: 0.02
  account_ccy: "AUD"
  fx_quotes: {}

tracking:
  track_win_loss_scratch: true
  track_roi: true
  track_drawdown: true
  in_sim_equity: true
  verbose_logs: false

cache:
  enabled: true
  dir: "cache"
  format: "parquet"

validation:
  enabled: true
  fail_fast: true
  strict_contract: false

output:
  results_dir: "results/phaseF_roi_sanity/ceb_v3_sl2r_trailing"

outputs:
  dir: "results/phaseF_roi_sanity/ceb_v3_sl2r_trailing"
  write_trades_csv: true

filters:
  dbcvix:
    enabled: false
