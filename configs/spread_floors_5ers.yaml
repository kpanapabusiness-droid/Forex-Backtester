  EUR_CAD:
    min_nonzero_spread_native: 18   # 1.8 pips
  EUR_CHF:
    min_nonzero_spread_native: 10   # 1.0 pips
  EUR_GBP:
    min_nonzero_spread_native: 8    # 0.8 pips
  EUR_JPY:
    min_nonzero_spread_native: 10   # 1.0 pips
  EUR_NZD:
    min_nonzero_spread_native: 38   # 3.8 pips
  EUR_USD:
    min_nonzero_spread_native: 3    # 0.3 pips
  GBP_AUD:
