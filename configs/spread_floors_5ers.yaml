provenance:
  curated: 2026-05-17
  methodology: HistData 2024-2025 active-session pooled p50 of first-5-minute distribution at 1H execution bars
  source_csv: results/spread_validation/execution_bar_spreads.csv
  calibration_doc: docs/calibration_decisions/SPREAD_FLOOR_CALIBRATION_DECISION_2026-05-17.md
  encoding: native points; pips = native / 10 uniform across all 28 pairs (see SPREAD_SEMANTICS_LOCK.md "Floor file encoding")
  prior_methodology: minimum-observed-nonzero spread per pair (script-generated, retired 2026-05-17)
  prior_script: scripts/lchar/compute_spread_floors.py (RETIRED)
