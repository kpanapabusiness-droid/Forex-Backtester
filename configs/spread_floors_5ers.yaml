# configs/spread_floors_5ers.yaml — Spread floors for L arc WFO
# ============================================================
# Calibration-curated as of 2026-05-17.
# Per-pair p50 of HistData first-5-minute spread distribution at 1H
# execution bars, active-session pooled (London/NY/overlap), 2024-2025
# window.
#
# CALIBRATION SOURCE:
#   docs/calibration_decisions/SPREAD_FLOOR_CALIBRATION_DECISION_2026-05-17.md
#
# PREVIOUS METHODOLOGY (retired):
#   This file was previously auto-generated by
#   scripts/lchar/compute_spread_floors.py from broker MT5 historical
#   data, producing minimum-observed-nonzero spread per pair (uniform
#   1 native point / 0.1 pip across all 28 pairs). That methodology is
#   retired as of 2026-05-17; see SPREAD_FLOOR_AUDIT_FINDING.md for the
#   issue that surfaced it and the calibration decision doc above for
#   the methodology change.
#
# ENCODING:
#   min_nonzero_spread_native is in raw MT5 points.
#   pips = native_points / 10  (uniform across all 28 pairs including JPY)
#   See SPREAD_SEMANTICS_LOCK.md "Floor file encoding" section.
#
# EFFECTIVE SCOPE:
#   L arc configs (configs/l_arc_*.yaml, configs/wfo_l_arc_*.yaml).
#   KH-24 (configs/wfo_kh24.yaml) does NOT load this file — uses raw
#   5ers MT5 per-bar spread directly.
#
# MECHANISM:
#   Raw 5ers per-bar spread is used when non-zero. min_nonzero_spread_native
#   applies as a floor only when raw spread is zero.
#
# RECALIBRATION CADENCE:
#   Every 6 months minimum, or upon broker change, or upon LP-to-retail
#   multiplier evidence change. Recalibration governance: L_ARC_PROTOCOL §12.

floors:
  AUD_CAD:
    min_nonzero_spread_native: 19   # 1.9 pips (p50, HistData 2024-2025)
  AUD_CHF:
    min_nonzero_spread_native: 14   # 1.4 pips
  AUD_JPY:
    min_nonzero_spread_native: 8    # 0.8 pips
  AUD_NZD:
    min_nonzero_spread_native: 21   # 2.05 pips → rounded up to 21
  AUD_USD:
    min_nonzero_spread_native: 10   # 1.0 pips
  CAD_CHF:
    min_nonzero_spread_native: 15   # 1.5 pips
  CAD_JPY:
    min_nonzero_spread_native: 12   # 1.2 pips
  CHF_JPY:
    min_nonzero_spread_native: 22   # 2.2 pips
  EUR_AUD:
