phase: l6_arc1_p2_concurrent_filter
description: |
  L6+ Arc 1 Phase 2 — concurrent-density filter (CH-001)
  Identical to configs/wfo_l6_arc1.yaml except for:
    1. New top-level `filter:` block applied at signal-bar close, before trade open.
    2. Output redirected to results/l6/arc1_p2/.
  Per docs/PHASE_L6_ARC1_P2_OPEN.md §3 (the one change), §7 (YAML diff spec),
  and CANDIDATE_HYPOTHESES.md CH-001 (PRE-COMMITTED → Arc 1 P2).

signal:
  type: l4_univariate_extreme
  signal_tf: 1H
  base: abs_log_return
  lookback_bars: 100
  threshold_quantile: 0.90
  threshold_comparison: strict_greater
  direction_filter: neg
  trade_direction: long

entry:
  bar_offset: 1
  execution: open

exit:
  hard_stop:
    type: atr_distance
    atr_period: 14
    atr_smoothing: wilder
    atr_tf: 1H
    multiplier: 2.0
    anchor: entry_price
  time_exit:
    bars_after_entry: 1
  trail: null
  structural_exits: []

filters: []

# NEW (Arc 1 P2): single boolean filter applied at signal-bar close, BEFORE
# trade is opened at bar N+1 open. take_trade = signal_fires AND
# (concurrent_signals_within_3h <= 13). Per PHASE_L6_ARC1_P2_OPEN.md §3.
# Lookahead invariant (§3.3): the count uses signal evaluations from bars
# [N-2, N] across all 28 pairs and ONLY those bars; CI-enforced.
filter:
  feature: concurrent_signals_within_3h
  op: '<='
  threshold: 13

exposure:
  max_concurrent_per_pair: 1
  currency_cap: null
  daily_dd_guard: false

risk:
  basis: reset_floor_balance
  pct_per_trade: 0.01
  starting_balance: 10000.0

spread_floor:
  enabled: true
  source: configs/spread_floors_5ers.yaml
  expected_body_sha256: 8da7644b252ae163d963fbd46807572906fa3e5a44fb3e02d771e181b3ecdc05

pairs:
  - AUD_CAD
  - AUD_CHF
  - AUD_JPY
  - AUD_NZD
  - AUD_USD
  - CAD_CHF
  - CAD_JPY
  - CHF_JPY
  - EUR_AUD
  - EUR_CAD
  - EUR_CHF
  - EUR_GBP
  - EUR_JPY
  - EUR_NZD
  - EUR_USD
  - GBP_AUD
  - GBP_CAD
  - GBP_CHF
  - GBP_JPY
  - GBP_NZD
  - GBP_USD
  - NZD_CAD
  - NZD_CHF
  - NZD_JPY
  - NZD_USD
  - USD_CAD
  - USD_CHF
  - USD_JPY

walk_forward:
  method: anchored_expanding
  n_folds: 7
  is_period_years: 4
  oos_period_months: 9
  oos_start: '2020-10-01'
  oos_end: '2026-01-01'

output:
  results_dir: results/l6/arc1_p2
  trades_csv: trades.csv
  fold_results_csv: wfo_fold_results.csv
  summary_txt: summary.txt
