phase: l_arc_1_step1_verbatim
description: |
  L Arc 1 (redo) — step 1 verbatim run (plumbing test, NOT a gate).
  Protocol: L_ARC_PROTOCOL.md v1.0 (locked 2026-05-13)
  Operational spec: L_ARC_OPERATIONAL_SPEC.md v1.0
  Arc-open doc: results/PHASE_L_ARC_1_OPEN.md
  Signal: TRIAL__univariate_extreme__abs_return_top_decile__neg__h_001
          (L registry rank 1, docs/LCHAR_TOPN_REGISTRY.md Entry 1)
  Canonical signal source: scripts/lchar/run_layer4.py (univariate_extreme,
                           abs_return_top_decile, neg, signal_TF=1H, h=1)
  Engine path: signal.type='l4_univariate_extreme' routes to
               core/signals/l4_univariate_extreme.py:run_l4_wfo
               (schema v2.1.0 path; no schema extension needed for step 1).

signal:
  type: l4_univariate_extreme
  signal_tf: 1H
  base: abs_log_return
  lookback_bars: 100
  threshold_quantile: 0.90
  threshold_comparison: strict_greater
  direction_filter: neg            # signal bar close < open
  trade_direction: long            # carried forward from L6.0 §6 / arc-open §2

entry:
  bar_offset: 1                    # bar N+1 open
  execution: open

exit:
  hard_stop:
    type: atr_distance
    atr_period: 14
    atr_smoothing: wilder
    atr_tf: 1H
    multiplier: 2.0
    anchor: entry_price
  time_exit:
    bars_after_entry: 1            # exit at bar N+2 open (h=1)
  trail: null
  structural_exits: []

filters: []                        # verbatim — no filters at step 1

exposure:
  max_concurrent_per_pair: 1
  currency_cap: null
  daily_dd_guard: false

risk:
  basis: reset_floor_balance
  pct_per_trade: 0.005             # L arc convention (protocol §4 rule 7)
  starting_balance: 10000.0

spread_floor:
  enabled: true
  source: configs/spread_floors_5ers.yaml
  expected_body_sha256: a613b4ce641c8d5218490531770a4924204029dedaa80fb24111beb61bd15547

pairs:
  - AUD_CAD
  - AUD_CHF
  - AUD_JPY
  - AUD_NZD
  - AUD_USD
  - CAD_CHF
  - CAD_JPY
  - CHF_JPY
  - EUR_AUD
  - EUR_CAD
  - EUR_CHF
  - EUR_GBP
  - EUR_JPY
  - EUR_NZD
  - EUR_USD
  - GBP_AUD
  - GBP_CAD
  - GBP_CHF
  - GBP_JPY
  - GBP_NZD
  - GBP_USD
  - NZD_CAD
  - NZD_CHF
  - NZD_JPY
  - NZD_USD
  - USD_CAD
  - USD_CHF
  - USD_JPY

walk_forward:
  method: anchored_expanding
  n_folds: 7
  is_period_years: 4
  oos_period_months: 9
  oos_start: '2020-10-01'
  oos_end: '2026-01-01'

output:
  results_dir: results/l_arc_1/step1_verbatim/
  trades_csv: trades_verbatim.csv
  fold_results_csv: wfo_fold_results.csv
  summary_txt: wfo_summary.txt
