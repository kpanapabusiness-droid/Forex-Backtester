phase: l_arc_2_step1_verbatim
description: |
  L Arc 2 — step 1 verbatim run (plumbing test, NOT a gate).
  Protocol: L_ARC_PROTOCOL.md v1.0 + L_ARC_PROTOCOL_v1.1_AMENDMENT.md (12 amendments)
  Operational spec: L_ARC_OPERATIONAL_SPEC.md v1.0
  Arc-open doc: results/l_arc_2/PHASE_L_ARC_2_OPEN.md
  Signal: TRIAL__mtf_alignment__2_down_mixed__kijun__h_120
          (L registry rank 2, docs/LCHAR_TOPN_REGISTRY.md Entry 2)
  Canonical signal source: scripts/lchar/run_layer4.py
                           (mtf_alignment family, 2_down_mixed base, kijun sub-spec,
                           signal_TF=1H, h=120)
  Engine path: signal.type='l4_mtf_alignment_2_down_mixed_kijun' routes to
               core/signals/l4_mtf_alignment_2_down_mixed_kijun.py:run_arc2_wfo
  Risk: L arc convention 0.5% (protocol §4 rule 7) — distinct from arc 2's L6
        convention which used 1.0%. Output dir distinct (results/l_arc_2/step1_verbatim/).

signal:
  type: l4_mtf_alignment_2_down_mixed_kijun
  signal_tf: 1H
  family: mtf_alignment
  state: 2_down_mixed
  trend_definition: kijun
  kijun_period: 26
  lower_tf: 1H
  middle_tf: 4H
  higher_tf: D1
  middle_tf_lag: most_recently_completed
  higher_tf_lag: most_recently_completed
  trade_direction: long

entry:
  bar_offset: 1                    # bar N+1 open
  execution: open

exit:
  hard_stop:
    type: absolute_atr
    atr_period: 14
    atr_smoothing: wilder
    atr_tf: 1H
    multiplier: 2.0
    anchor: entry
  time_exit:
    bars_after_entry: 120          # exit at bar N+121 open (h=120)
  trail: null
  structural_exits: []

filters: []                        # verbatim — no filters at step 1

exposure:
  max_concurrent_per_pair: 1
  currency_cap: null
  daily_dd_guard: null

risk:
  basis: reset_floor
  pct_per_trade: 0.005             # L arc convention (protocol §4 rule 7)
  starting_balance: 10000.0

spread_floor:
  enabled: true
  source: configs/spread_floors_5ers.yaml
  expected_body_sha256: a613b4ce641c8d5218490531770a4924204029dedaa80fb24111beb61bd15547

