# wfo_l_arc_9.yaml — Arc 9 Step 1 plumbing config (L_ARC_PROTOCOL v2.3)
#
# Signal under test: inside-bar break in trend, long (per
# docs/signal_spec_inside_bar_break_trend_long_v0.1.md).
# 4H signal TF, long-only, single pass over the full data window.
#
# Protocol: L_ARC_PROTOCOL v2.1.2 + v2.2 + v2.3 amendments.
#   §5  Step 1
#   §15a trades_paths.csv schema
#   v2.2 §1a / v2.3 §7 live-execution equivalence

phase: L_ARC_9_STEP_1_PLUMBING
description: |
  Arc 9 Step 1 plumbing — full-window trade pool for the inside-bar
  break-in-trend long signal. 4H signal TF, long-only, single pass over
  2020-10-01..2026-01-31. Deterministic, §15a-compliant trades_paths.csv
  (is_held column, forward observation bars to entry+240 regardless of
  exit reason). v2.3 Step 1 gates: pool >= 500, byte-identical re-run,
  lookahead-invariant, schema-valid, Phase A spread semantics tests green.

signal:
  module: signals.lchar_inside_bar_break_trend_long
  trial_id: ARC_9__inside_bar_break_trend__long__4h__h_240
  family: trend_continuation
  base: inside_bar_break_trend
  signal_tf: "4H"
  trade_direction: long
  trend_window: 30
  swing_half: 3
  swing_right_edge_lag: 4
  refractory_bars: 20

data:
  data_dirs:
    "4H": "C:/Users/panap/Documents/Forex-Backtester/data/4hr"
  date_start: "2020-10-01"
  date_end: "2026-01-31"

# All 28 FX pairs (KH-24 set, identical to configs/wfo_kh24.yaml /
# configs/wfo_l_arc_7.yaml).
pairs:
  - AUD_CAD
  - AUD_CHF
  - AUD_JPY
  - AUD_NZD
  - AUD_USD
  - CAD_CHF
  - CAD_JPY
  - CHF_JPY
  - EUR_AUD
  - EUR_CAD
  - EUR_CHF
  - EUR_GBP
  - EUR_JPY
  - EUR_NZD
  - EUR_USD
  - GBP_AUD
  - GBP_CAD
  - GBP_CHF
  - GBP_JPY
  - GBP_NZD
  - GBP_USD
  - NZD_CAD
  - NZD_CHF
  - NZD_JPY
  - NZD_USD
  - USD_CAD
  - USD_CHF
  - USD_JPY

entry:
  bar_offset: 1
  execution: open

exit:
  hard_stop:
    type: absolute_atr
    atr_period: 14
    atr_smoothing: wilder
    atr_tf: "4H"
    multiplier: 2.0
    anchor: entry_price
  time_exit:
    bars_after_entry: 240
  trail: null
  structural_exits: []

exposure:
  max_concurrent_per_pair: 1
  currency_cap: null
  concurrent_trade_cap: null

risk:
  pct_per_trade: 0.005
  starting_balance: 10000.0
  basis: reset_floor

spreads:
  enabled: true
  source: per_bar
  points_per_pip: 10.0
  default_pips: 0.0

spread_floor:
  enabled: true
  source: configs/spread_floors_5ers.yaml
  expected_body_sha256: 8da7644b252ae163d963fbd46807572906fa3e5a44fb3e02d771e181b3ecdc05

trade_paths:
  enabled: true
  forward_window_bars: 240

output:
  results_dir: results/l_arc_9/step1_verbatim
  trades_csv: trades_all.csv
  paths_csv: trades_paths.csv
  prefilter_csv: prefilter_events.csv
  manifest_json: manifest.json
  float_format: "%.10g"

gate:
  pool_size_min: 500
  determinism: byte_identical_two_run
  schema_check: v2_3_strict
