# --- verbatim configs/arc_2_redo2/step2.yaml ---
# Arc 2 redo2 — Step 2 path-shape clustering config
#
# Protocol: L_ARC_PROTOCOL.md v2.1.1 §§1, 6, 11
# Input:   results/l_arc_2_redo2/step1/trades_paths.csv + trades_all.csv
# Outputs: results/l_arc_2_redo2/step2/...

phase: arc_2_redo2_step2
description: >-
  Path-shape clustering on Arc 2 redo2 Step 1 pool (12,262 trades).
  Outcome-blind features per v2.1.1 §6, K-means sweep K in {3..7},
  cluster-to-archetype labelling per §11. Features computed on
  is_held=1 rows only (held window per v2.1.1 §17 — exit bar inclusive).

input:
  step1_dir: results/l_arc_2_redo2/step1
  paths_csv: trades_paths.csv
  trades_csv: trades_all.csv
  # Prior arc_2_redo K=4 cluster assignments for Jaccard overlap comparison.
  # Optional; if missing, jaccard reported as "n/a".
  prior_clusters_csv: results/l_arc_2_redo/step2/clusters_K4.csv

output:
  results_dir: results/l_arc_2_redo2/step2
  features_csv: path_features.csv
  diagnostics_csv: feature_diagnostics.csv
  histograms_png: feature_histograms.png
  sweep_csv: silhouette_sweep.csv
  archetypes_csv: archetype_assignments.csv
  jaccard_csv: jaccard_vs_prior_K4.csv
  summary_md: STEP2_SUMMARY.md
  determinism_check: true

# ----------------------------------------------------------------------
# Clustering parameters (v2.1.1 §6 locked)
# ----------------------------------------------------------------------
clustering:
  k_sweep: [3, 4, 5, 6, 7]
  random_state: 42
  n_init: 10
  max_iter: 300
  silhouette_sample_size: 5000

# ----------------------------------------------------------------------
# K-selection tolerance (v2.1.1 §6 / §1.21 / Open-12 closure)
# ----------------------------------------------------------------------
k_selection:
  tie_tolerance_absolute: 0.01     # smaller K preferred within ±0.01 silhouette

# ----------------------------------------------------------------------
# Feature degeneracy thresholds (v2.1.1 §6)
# ----------------------------------------------------------------------
degeneracy:
  modal_bin_mass_threshold: 0.80   # >80% mass in single hist bin = flag
  histogram_bins: 50

# ----------------------------------------------------------------------
# Gate thresholds (v2.1.1 §6)
# ----------------------------------------------------------------------
gates:
  silhouette_min: 0.30
  max_cluster_fraction: 0.90       # no cluster > 90% of trades
  min_cluster_count: 30            # all clusters >= 30 trades

# ----------------------------------------------------------------------
# Archetype boundary (v2.1.1 §11)
# ----------------------------------------------------------------------
archetype:
  # A cluster centroid is "near" a threshold if within this fraction of it.
  boundary_relative_distance: 0.10
